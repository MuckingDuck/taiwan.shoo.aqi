<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣即時空氣品質觀測</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" crossorigin="anonymous" />
    <style>
        body { margin: 0; padding: 0; font-family: '微軟正黑體', Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 2; height: 100%; background-color: #e5e3df; }
        #sidebar { flex: 1; background: #f8f9fa; padding: 20px; overflow-y: auto; border-left: 2px solid #ddd; display: flex; flex-direction: column; }
        
        .station-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .station-name { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .county-name { color: #666; font-size: 14px; margin-bottom: 15px; }
        .aqi-value { font-size: 36px; font-weight: bold; display: inline-block; padding: 5px 15px; border-radius: 20px; color: black; }
        
        .aqi-good { background-color: #00e800; }
        .aqi-moderate { background-color: #ffff00; }
        .aqi-sensitive { background-color: #ff7e00; }
        .aqi-unhealthy { background-color: #ff0000; color: white !important;}
        .aqi-very { background-color: #8f3f97; color: white !important;}
        .aqi-hazardous { background-color: #7e0023; color: white !important;}

        #chart-container { flex: 1; min-height: 250px; margin-top: 20px; }
        .legend { display: flex; justify-content: center; gap: 10px; padding: 10px; background: white; font-size: 12px;}
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; border: 1px solid #ccc; }
        
        .warning-msg { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; text-align: left; margin-bottom: 15px; border: 1px solid #ffeeba; font-size: 14px; word-break: break-all; }
    </style>
</head>
<body>

    <header>台灣即時空氣品質 (AQI) 觀測</header>
    
    <div class="legend">
        <div class="legend-item"><div class="color-box aqi-good"></div>良好(0-50)</div>
        <div class="legend-item"><div class="color-box aqi-moderate"></div>普通(51-100)</div>
        <div class="legend-item"><div class="color-box aqi-sensitive"></div>敏感不健康(101-150)</div>
        <div class="legend-item"><div class="color-box aqi-unhealthy"></div>所有不健康(151-200)</div>
    </div>

    <div id="main-container">
        <div id="map"></div>
        <div id="sidebar">
            <div id="station-info">
                <p id="loading-text" style="color: #3498db; text-align: center; margin-top: 50px; font-weight: bold;">連線中，讀取環境部資料...</p>
            </div>
            <div id="chart-container" style="display: none;">
                <canvas id="aqiChart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js" crossorigin="anonymous"></script>

    <script>
        let map, chartInstance;

        document.addEventListener('DOMContentLoaded', () => {
            map = L.map('map').setView([23.6978, 120.9605], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors', maxZoom: 18
            }).addTo(map);

            function getAqiStatus(aqi) {
                if (aqi === "" || aqi == null) return { class: 'aqi-good', text: '維護中', color: '#cccccc' };
                aqi = parseInt(aqi);
                if (aqi <= 50) return { class: 'aqi-good', text: '良好', color: '#00e800' };
                if (aqi <= 100) return { class: 'aqi-moderate', text: '普通', color: '#ffff00' };
                if (aqi <= 150) return { class: 'aqi-sensitive', text: '對敏感族群不健康', color: '#ff7e00' };
                if (aqi <= 200) return { class: 'aqi-unhealthy', text: '對所有不健康', color: '#ff0000' };
                if (aqi <= 300) return { class: 'aqi-very', text: '非常不健康', color: '#8f3f97' };
                return { class: 'aqi-hazardous', text: '危害', color: '#7e0023' };
            }

            function createCustomIcon(color, aqi) {
                return L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background-color:${color}; width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 4px rgba(0,0,0,0.5);">${aqi || '-'}</div>`,
                    iconSize: [30, 30], iconAnchor: [15, 15]
                });
            }

            const mockData = [
                { sitename: "系統測試", county: "測試市", aqi: "50", latitude: "23.5", longitude: "121", "pm2.5": "0", pm10: "0", publishtime: "系統模擬時間" }
            ];

            function renderMarkers(records, isMock = false) {
                map.eachLayer((layer) => { if (layer instanceof L.Marker) map.removeLayer(layer); });

                records.forEach(station => {
                    const lat = parseFloat(station.latitude || station.Latitude);
                    const lon = parseFloat(station.longitude || station.Longitude);
                    const aqi = station.aqi || station.AQI;
                    
                    if (lat && lon) {
                        const status = getAqiStatus(aqi);
                        const marker = L.marker([lat, lon], { icon: createCustomIcon(status.color, aqi) }).addTo(map);
                        marker.on('click', () => updateSidebar(station, status, isMock));
                    }
                });
            }

            function updateSidebar(station, status, isMock) {
                const infoDiv = document.getElementById('station-info');
                const chartDiv = document.getElementById('chart-container');

                const county = station.county || station.County || "未知";
                const sitename = station.sitename || station.SiteName || "未知";
                const aqi = station.aqi || station.AQI || "N/A";
                const publishtime = station.publishtime || station.PublishTime || "無時間資料";
                const pm25 = station['pm2.5'] || station['PM2.5'] || "N/A";
                const pm10 = station.pm10 || station.PM10 || "N/A";

                const mockBadge = isMock ? `<span style="background:red;color:white;padding:2px 5px;border-radius:3px;font-size:12px;margin-left:10px;">測試資料</span>` : '';

                infoDiv.innerHTML = `
                    <div class="station-card">
                        <div class="county-name">${county} / ${sitename} 測站 ${mockBadge}</div>
                        <div class="station-name">${sitename} 行政區</div>
                        <div style="margin-top: 15px;">
                            <span class="aqi-value ${status.class}">AQI: ${aqi}</span>
                            <span style="margin-left: 10px; font-weight:bold;">${status.text}</span>
                        </div>
                        <p style="margin-top: 15px; font-size: 14px; color: #555;">
                            更新時間: ${publishtime}<br>
                            PM2.5: ${pm25} μg/m³<br>
                            PM10: ${pm10} μg/m³
                        </p>
                    </div>
                    <h3>24小時空氣品質趨勢 (系統模擬)</h3>
                `;

                chartDiv.style.display = 'block';
                if (typeof Chart !== 'undefined') renderChart(sitename, aqi);
            }

            function renderChart(stationName, currentAqi) {
                const ctx = document.getElementById('aqiChart').getContext('2d');
                if (chartInstance) chartInstance.destroy();

                const labels = []; const dataPoints = []; const now = new Date();
                const currentAqiNum = parseInt(currentAqi) || 50;

                for (let i = -12; i <= 12; i++) {
                    let time = new Date(now.getTime() + i * 60 * 60 * 1000);
                    labels.push(`${time.getHours()}:00`);
                    let randomFluctuation = Math.floor(Math.random() * 20) - 10;
                    dataPoints.push(Math.max(0, currentAqiNum + randomFluctuation + (Math.abs(i) * 2)));
                }

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [{ label: `AQI 趨勢`, data: dataPoints, borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.2)', borderWidth: 2, fill: true, tension: 0.4 }] },
                    options: { responsive: true, scales: { y: { beginAtZero: true, suggestedMax: 150 } } }
                });
            }

            async function fetchAQIData() {
                try {
                    const userApiKey = '3647d90d-4f06-421c-8351-e790de716913';
                    const timestamp = new Date().getTime();
                    const directUrl = `https://data.moenv.gov.tw/api/v2/aqx_p_432?api_key=${userApiKey}&limit=1000&format=JSON&t=${timestamp}`;
                    
                    const response = await fetch(directUrl);
                    const data = await response.json();

                    if (data.message) { throw new Error(`政府系統回覆：${data.message}`); }
                    
                    // 🌟【關鍵修復點】：相容政府不同的資料包裝方式
                    // 如果資料本身就是陣列（您截圖的情況），就直接使用 data
                    // 如果資料包在 records 裡，就取出 data.records
                    const records = Array.isArray(data) ? data : data.records;

                    if (!records || records.length === 0) {
                        throw new Error(`無法解析資料，內容為：${JSON.stringify(data)}`);
                    }

                    renderMarkers(records, false);
                    document.getElementById('station-info').innerHTML = "<p style='color: #27ae60; text-align: center; margin-top: 50px; font-size: 18px;'>✅ 全台真實即時資料讀取成功！<br>請點選地圖上任一測站查看詳細數據。</p>";

                } catch (error) {
                    console.warn("API 失敗:", error);
                    renderMarkers(mockData, true);
                    document.getElementById('station-info').innerHTML = `
                        <div class="warning-msg" style="text-align: center;">
                            <strong>⚠️ 處理資料時發生錯誤</strong><br><br>
                            ${error.message}
                        </div>
                    `;
                }
            }

            fetchAQIData();
        });
    </script>
</body>
</html>
